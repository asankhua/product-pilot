name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Add Hugging Face as a remote
          git remote add huggingface https://ashishsankhua:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/product-pilot.git || git remote set-url huggingface https://ashishsankhua:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/product-pilot.git
          
          # Push to Hugging Face
          git push huggingface main --force
